<!DOCTYPE html>
<html>
<head>
    <title>Audit Tool</title>
</head>

<body style="background:#0f172a; color:white; text-align:center; padding:40px;">

    <h1>Audit Tool</h1>

    <select id="clinic">
        <option value="">Select Clinic</option>
    </select>

    <br><br>

    <select id="category">
        <option value="">Select Category</option>
    </select>

    <br><br>

    <button onclick="runAudit()">Run Audit</button>

    <p id="result"></p>

    <script>
        async function loadData() {
            const url = "https://docs.google.com/spreadsheets/d/14mJ8MC9RbpJbLbAkoxcDXPQeTsw3I5hO3cYPTpXilvs/export?format=csv&gid=1766772634";

            let response = await fetch(url);
            let data = await response.text();

            let rows = data.split("\n").slice(1);

            let clinicDropdown = document.getElementById("clinic");
            let categoryDropdown = document.getElementById("category");

            rows.forEach(row => {
                let cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

                if (cols && cols.length >= 2) {
                    let clinic = cols[0].replace(/"/g, "").trim();
                    let category = cols[1].replace(/"/g, "").trim();

                    if (clinic) {
                        let opt = document.createElement("option");
                        opt.text = clinic;
                        clinicDropdown.appendChild(opt);
                    }

                    if (category) {
                        let opt = document.createElement("option");
                        opt.text = category;
                        categoryDropdown.appendChild(opt);
                    }
                }
            });
        }

        function runAudit() {
            let clinic = document.getElementById("clinic").value;
            let category = document.getElementById("category").value;

            if (!clinic || !category) {
                document.getElementById("result").innerText = "⚠️ Select both";
                return;
            }

            document.getElementById("result").innerText =
                "✅ " + clinic + " - " + category;
        }

        window.onload = loadData;
    </script>

</body>
</html>
