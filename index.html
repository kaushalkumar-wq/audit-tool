<script>
async function loadData() {
    const url = "https://docs.google.com/spreadsheets/d/14mJ8MC9RbpJbLbAkoxcDXPQeTsw3I5hO3cYPTpXilvs/export?format=csv&gid=1766772634";

    let response = await fetch(url);
    let data = await response.text();

    let rows = data.split("\n").slice(1); // skip header

    let clinicSet = new Set();
    let categorySet = new Set();

    rows.forEach(row => {
        let cols = row.split(",");
        if(cols[0]) clinicSet.add(cols[0].trim());
        if(cols[1]) categorySet.add(cols[1].trim());
    });

    let clinicDropdown = document.getElementById("clinic");
    let categoryDropdown = document.getElementById("category");

    clinicSet.forEach(c => {
        let option = document.createElement("option");
        option.text = c;
        clinicDropdown.add(option);
    });

    categorySet.forEach(c => {
        let option = document.createElement("option");
        option.text = c;
        categoryDropdown.add(option);
    });
}

window.onload = loadData;

function runAudit() {
    let clinic = document.getElementById("clinic").value;
    let category = document.getElementById("category").value;

    if (!clinic || !category) {
        document.getElementById("result").innerText = "⚠️ Please select all fields";
        return;
    }

    document.getElementById("result").innerText =
        "✅ Audit Started for " + clinic + " (" + category + ")";
}
</script>
