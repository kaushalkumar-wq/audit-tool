<script>
async function loadData() {
    const url = "https://docs.google.com/spreadsheets/d/14mJ8MC9RbpJbLbAkoxcDXPQeTsw3I5hO3cYPTpXilvs/export?format=csv&gid=1766772634";

    let response = await fetch(url);
    let data = await response.text();

    let rows = data.split("\n").slice(1);

    let clinicDropdown = document.getElementById("clinic");
    let categoryDropdown = document.getElementById("category");

    rows.forEach(row => {
        let cols = row.split(",");

        if (cols.length >= 2) {
            let clinic = cols[0].replace(/"/g, "").trim();
            let category = cols[1].replace(/"/g, "").trim();

            if (clinic && ![...clinicDropdown.options].some(o => o.text === clinic)) {
                let option = document.createElement("option");
                option.text = clinic;
                clinicDropdown.add(option);
            }

            if (category && ![...categoryDropdown.options].some(o => o.text === category)) {
                let option = document.createElement("option");
                option.text = category;
                categoryDropdown.add(option);
            }
        }
    });
}

window.onload = loadData;
</script>
