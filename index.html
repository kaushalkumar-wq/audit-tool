<!DOCTYPE html>
<html>
<head>
    <title>Vetic Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #fff7fb, #ffe3ef);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1f2937;
        }
        .wrap {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }
        .card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #f8cddd;
            border-radius: 24px;
            padding: 32px 28px;
            box-shadow: 0 20px 50px rgba(255, 77, 136, 0.12);
        }
        .logo {
            width: 72px;
            height: 72px;
            margin: 0 auto 14px;
            border-radius: 20px;
            background: linear-gradient(135deg, #ff4d88, #ff8fb3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            color: white;
            box-shadow: 0 10px 24px rgba(255, 77, 136, 0.28);
        }
        h1 {
            margin: 0;
            text-align: center;
            font-size: 30px;
        }
        .sub {
            text-align: center;
            color: #6b7280;
            margin: 8px 0 24px;
            font-size: 14px;
        }
        label {
            display: block;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            margin: 14px 0 8px;
            color: #4b5563;
        }
        input {
            width: 100%;
            padding: 14px 14px;
            border: 1px solid #f3bfd2;
            border-radius: 14px;
            outline: none;
            font-size: 14px;
            background: #fff;
        }
        input:focus {
            border-color: #ff4d88;
            box-shadow: 0 0 0 4px rgba(255, 77, 136, 0.12);
        }
        button {
            width: 100%;
            margin-top: 22px;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff4d88, #ff7aa7);
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(255, 77, 136, 0.25);
        }
        button:hover {
            transform: translateY(-1px);
        }
        .msg {
            margin-top: 14px;
            text-align: center;
            font-size: 14px;
            min-height: 20px;
        }
        .hint {
            margin-top: 18px;
            font-size: 12px;
            color: #6b7280;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <div class="logo">🐾</div>
            <h1>Vetic Login</h1>
            <div class="sub">Sign in to access the audit dashboard</div>

            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Enter your email" />

            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter your password" />

            <button onclick="login()">Login</button>

            <div id="msg" class="msg"></div>
            <div class="hint">Admin access is controlled separately.</div>
        </div>
    </div>

    <script>
        const users = [
            {
                email: "Kaushal.kumar@vetic.in",
                password: "Admin@123",
                role: "admin",
                name: "Kaushal Kumar"
            },
            {
                email: "user1@vetic.in",
                password: "User@123",
                role: "user",
                name: "Team Member"
            },
            {
                email: "user2@vetic.in",
                password: "User@123",
                role: "user",
                name: "Audit User"
            }
        ];

        function login() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const msg = document.getElementById("msg");

            const foundUser = users.find(
                u => u.email.toLowerCase() === email.toLowerCase() && u.password === password
            );

            if (!foundUser) {
                msg.style.color = "#e11d48";
                msg.innerText = "Invalid email or password";
                return;
            }

            localStorage.setItem("vetic_logged_in", "true");
            localStorage.setItem("vetic_user_email", foundUser.email);
            localStorage.setItem("vetic_user_role", foundUser.role);
            localStorage.setItem("vetic_user_name", foundUser.name);

            window.location.href = "audit.html";
        }
    </script>
</body>
</html>
