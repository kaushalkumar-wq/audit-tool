<!DOCTYPE html>
<html>
<head>
<title>Vetic Login</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#ffe4ec,#ffffff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
width:320px;
text-align:center;
}

h2{
color:#ff4d88;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#ff4d88;
color:white;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>Vetic 🐾 Login</h2>

<form method="POST">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>

</div>

</body>
</html>
